services:
  - type: web
    name: wannav-sales
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: wannav-data
      mountPath: /var/data
      sizeGB: 1
